name: Staging smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    env:
      BACKEND_APP_DIR: /home/deploy/apps/food-crm-backend-staging
      DEPLOY_HOST: 163.5.29.68
      DEPLOY_USER: deploy
      DEPLOY_PORT: 22

    steps:
      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s' "${{ secrets.DEPLOY_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Run staging smoke
        run: |
          set -euo pipefail
          SSH=(ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST")
          "${SSH[@]}" "BACKEND_APP_DIR='$BACKEND_APP_DIR' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$BACKEND_APP_DIR/current"
          trap 'echo "::group::staging backend logs"; pm2 logs food-crm-backend-staging --lines 160 --nostream || true; echo "::endgroup::"; echo "::group::staging frontend logs"; pm2 logs food-crm-frontend-staging --lines 80 --nostream || true; echo "::endgroup::"' ERR

          SMOKE_ADMIN_PHONE="+79009999101"
          SMOKE_PASSWORD="Smoke$(openssl rand -hex 12)Aa1!"
          ADMIN_PHONE="$SMOKE_ADMIN_PHONE" ADMIN_PASSWORD="$SMOKE_PASSWORD" ADMIN_ROLE="admin" npm run admin:create >/tmp/food-crm-staging-smoke-admin.log

          SMOKE_PASSWORD="$SMOKE_PASSWORD" node --input-type=module <<'NODE'
          import assert from "node:assert/strict";
          import { createHmac } from "node:crypto";
          import { readFileSync } from "node:fs";
          import pg from "pg";

          function loadEnv(path) {
            const content = readFileSync(path, "utf8");
            for (const line of content.split(/\r?\n/)) {
              const trimmed = line.trim();
              if (!trimmed || trimmed.startsWith("#")) continue;
              const index = trimmed.indexOf("=");
              if (index === -1) continue;
              const key = trimmed.slice(0, index);
              const value = trimmed.slice(index + 1);
              process.env[key] = value.replace(/^["']|["']$/g, "");
            }
          }

          loadEnv(".env");

          const api = "http://127.0.0.1:4100";
          const web = "http://127.0.0.1:3100";
          const sessionCookieName = process.env.BACKEND_SESSION_COOKIE_NAME || "food_crm_api_session";
          const clientCookieName = process.env.BACKEND_CLIENT_SESSION_COOKIE_NAME || "food_crm_client_session";
          const sessionSecret = process.env.BACKEND_SESSION_SECRET || process.env.SESSION_SECRET;
          assert.ok(sessionSecret && sessionSecret.length >= 32, "SESSION_SECRET is not strong enough on staging");

          const adminPhone = "79009999101";
          const adminPassword = process.env.SMOKE_PASSWORD;
          assert.ok(adminPassword, "Smoke password was not generated");

          async function request(path, options = {}) {
            const response = await fetch(`${api}${path}`, {
              ...options,
              headers: {
                "content-type": "application/json",
                ...(options.headers || {}),
              },
            });
            const text = await response.text();
            let body = null;
            try {
              body = text ? JSON.parse(text) : null;
            } catch {
              body = { raw: text };
            }
            if (!response.ok) {
              throw new Error(`${path} failed with ${response.status}: ${text.slice(0, 500)}`);
            }
            return { response, body };
          }

          async function requestAllowFailure(path, options = {}) {
            const response = await fetch(`${api}${path}`, {
              ...options,
              headers: {
                "content-type": "application/json",
                ...(options.headers || {}),
              },
            });
            const text = await response.text();
            let body = null;
            try {
              body = text ? JSON.parse(text) : null;
            } catch {
              body = { raw: text };
            }
            return { response, body, text };
          }

          async function webRequest(path, cookie) {
            const response = await fetch(`${web}${path}`, {
              redirect: "manual",
              headers: cookie ? { cookie } : undefined,
            });
            if (response.status >= 400) {
              throw new Error(`frontend ${path} failed with ${response.status}`);
            }
            return response;
          }

          const pool = new pg.Pool({ connectionString: process.env.DATABASE_URL });

          async function seedData() {
            const employee = await pool.query(
              `
                INSERT INTO "Employee" ("name", "email", "role", "phone", "messenger")
                VALUES ('SMOKE Dispatcher', 'smoke-dispatcher@foodlike.local', 'Диспетчер', '+7 900 999 91 11', 'staging smoke')
                ON CONFLICT ("email")
                DO UPDATE SET "name" = EXCLUDED."name", "role" = EXCLUDED."role", "phone" = EXCLUDED."phone"
                RETURNING "id"
              `,
            );

            const client = await pool.query(
              `
                INSERT INTO "Client" ("name", "type", "email", "phone", "birthDate", "address", "notes")
                VALUES ('SMOKE Client', 'CLIENT', 'smoke-client@foodlike.local', '+7 900 999 92 02', '1990-01-01', 'г. Smoke, ул. Test, д. 1', 'staging smoke')
                ON CONFLICT ("phone")
                DO UPDATE SET "name" = EXCLUDED."name", "type" = EXCLUDED."type", "birthDate" = EXCLUDED."birthDate", "address" = EXCLUDED."address"
                RETURNING "id"
              `,
            );

            const product = await pool.query(
              `
                WITH updated AS (
                  UPDATE "Product"
                  SET
                    "name" = 'SMOKE Ingredient',
                    "category" = 'Ингредиенты',
                    "unit" = 'шт',
                    "stockQuantity" = 100,
                    "priceCents" = 1000,
                    "description" = 'staging smoke'
                  WHERE "sku" = 'SMOKE-STAGING-INGREDIENT'
                  RETURNING "id"
                ),
                inserted AS (
                  INSERT INTO "Product" ("name", "sku", "category", "unit", "stockQuantity", "priceCents", "description")
                  SELECT 'SMOKE Ingredient', 'SMOKE-STAGING-INGREDIENT', 'Ингредиенты', 'шт', 100, 1000, 'staging smoke'
                  WHERE NOT EXISTS (SELECT 1 FROM updated)
                  RETURNING "id"
                )
                SELECT "id" FROM updated
                UNION ALL
                SELECT "id" FROM inserted
                LIMIT 1
              `,
            );

            const techCard = await pool.query(
              `
                WITH updated AS (
                  UPDATE "TechnologicalCard"
                  SET
                    "category" = 'Пицца',
                    "outputQuantity" = 1,
                    "outputUnit" = 'шт',
                    "description" = 'staging smoke'
                  WHERE "name" = 'SMOKE Staging Tech Card'
                  RETURNING "id"
                ),
                inserted AS (
                  INSERT INTO "TechnologicalCard" ("name", "category", "outputQuantity", "outputUnit", "description")
                  SELECT 'SMOKE Staging Tech Card', 'Пицца', 1, 'шт', 'staging smoke'
                  WHERE NOT EXISTS (SELECT 1 FROM updated)
                  RETURNING "id"
                )
                SELECT "id" FROM updated
                UNION ALL
                SELECT "id" FROM inserted
                LIMIT 1
              `,
            );

            await pool.query(`DELETE FROM "TechCardIngredient" WHERE "technologicalCardId" = $1`, [techCard.rows[0].id]);
            await pool.query(
              `
                INSERT INTO "TechCardIngredient" ("technologicalCardId", "productId", "quantity", "unit")
                VALUES ($1, $2, 1, 'шт')
              `,
              [techCard.rows[0].id, product.rows[0].id],
            );

            const catalog = await pool.query(
              `
                INSERT INTO "CatalogItem" (
                  "name", "slug", "category", "kitchenZone", "kitchenZones", "description",
                  "imageUrl", "priceCents", "isPublished", "technologicalCardId"
                )
                VALUES (
                  'SMOKE Pizza', 'smoke-staging-item', 'Пицца', 'pizza', ARRAY['pizza'],
                  'staging smoke', '/icon.png', 45000, true, $1
                )
                ON CONFLICT ("slug")
                DO UPDATE SET
                  "name" = EXCLUDED."name",
                  "category" = EXCLUDED."category",
                  "kitchenZone" = EXCLUDED."kitchenZone",
                  "kitchenZones" = EXCLUDED."kitchenZones",
                  "priceCents" = EXCLUDED."priceCents",
                  "isPublished" = true,
                  "technologicalCardId" = EXCLUDED."technologicalCardId"
                RETURNING "id"
              `,
              [techCard.rows[0].id],
            );

            await pool.query(`DELETE FROM "CatalogItemVariant" WHERE "catalogItemId" = $1`, [catalog.rows[0].id]);
            const variant = await pool.query(
              `
                INSERT INTO "CatalogItemVariant" (
                  "catalogItemId", "technologicalCardId", "label", "priceCents", "isDefault", "displayOrder"
                )
                VALUES ($1, $2, 'Стандарт', 45000, true, 0)
                RETURNING "id"
              `,
              [catalog.rows[0].id, techCard.rows[0].id],
            );

            return {
              employeeId: employee.rows[0].id,
              clientId: client.rows[0].id,
              productId: product.rows[0].id,
              catalogItemId: catalog.rows[0].id,
              catalogItemVariantId: variant.rows[0].id,
            };
          }

          function createPublicClientCookie(phone) {
            const expiresAt = Date.now() + 30 * 24 * 60 * 60 * 1000;
            const encodedPayload = Buffer
              .from(JSON.stringify({ phone, expiresAt }))
              .toString("base64url");
            const signature = createHmac("sha256", sessionSecret)
              .update(`client:${encodedPayload}`)
              .digest("hex");
            return `${clientCookieName}=${encodedPayload}.${signature}`;
          }

          const data = await seedData();
          const smokeMarker = `staging smoke ${new Date().toISOString()}`;
          const summary = [];

          function orderIds(orders) {
            return Array.isArray(orders) ? orders.map((order) => order.id) : [];
          }

          function hasOrder(orders, orderId) {
            return orderIds(orders).includes(orderId);
          }

          function errorCode(result) {
            return result.body?.error?.code || null;
          }

          async function getWorkspace() {
            return request("/api/v1/dispatcher/workspace", { headers: authHeaders });
          }

          async function getOrderingStatus() {
            return request("/api/v1/public/ordering-status");
          }

          async function createPublicSmokeOrder() {
            return request("/api/v1/public/orders", {
              method: "POST",
              headers: { cookie: createPublicClientCookie("79009999202") },
              body: JSON.stringify({
                deliveryAddress: "г. Smoke, ул. Test, д. 1",
                recipientPhone: "+79009999202",
                paymentMethod: "cash",
                customerComment: smokeMarker,
                items: [{
                  catalogItemId: data.catalogItemId,
                  catalogItemVariantId: data.catalogItemVariantId,
                  quantity: 1,
                  choices: [],
                }],
              }),
            });
          }

          async function setOrderStatus(orderId, status) {
            return request(`/api/v1/orders/${orderId}/status`, {
              method: "PATCH",
              headers: authHeaders,
              body: JSON.stringify({ status }),
            });
          }

          await request("/api/v1/health");
          const login = await request("/api/v1/auth/login", {
            method: "POST",
            body: JSON.stringify({ phone: adminPhone, password: adminPassword }),
          });

          const setCookie = login.response.headers.get("set-cookie") || "";
          assert.match(setCookie, new RegExp(`${sessionCookieName}=`), "auth login did not set CRM session cookie");
          assert.match(setCookie, /Max-Age=2592000/i, "CRM session cookie is not 30 days");
          const token = login.body?.data?.token;
          assert.ok(token, "auth login did not return bearer token");
          const crmCookie = `${sessionCookieName}=${token}`;
          const authHeaders = { authorization: `Bearer ${token}` };

          const me = await request("/api/v1/auth/me", { headers: authHeaders });
          assert.equal(me.body?.data?.phone, adminPhone, "auth/me returned a different user");

          await webRequest("/api/health");
          await webRequest("/login");
          await webRequest("/dashboard/orders", crmCookie);

          const roleModels = await request("/api/v1/access-model", { headers: authHeaders });
          const roleByName = new Map((roleModels.body?.data?.roles || []).map((role) => [role.role, role.permissions || []]));
          const dispatcherPermissions = roleByName.get("Диспетчер") || [];
          const managerPermissions = roleByName.get("Управляющий") || [];
          const cookPermissions = roleByName.get("Повар") || [];
          for (const permission of ["view_orders", "manage_orders", "view_clients", "manage_dispatcher_shift"]) {
            assert.ok(dispatcherPermissions.includes(permission), `dispatcher misses ${permission}`);
          }
          for (const permission of ["cancel_orders", "delete_orders", "view_dispatcher_shifts", "view_inventory", "manage_inventory"]) {
            assert.equal(dispatcherPermissions.includes(permission), false, `dispatcher unexpectedly has ${permission}`);
          }
          for (const permission of ["manage_dispatcher_shift", "view_dispatcher_shifts", "cancel_orders", "delete_orders"]) {
            assert.ok(managerPermissions.includes(permission), `manager misses ${permission}`);
          }
          for (const permission of ["manage_dispatcher_shift", "view_dispatcher_shifts", "cancel_orders", "delete_orders"]) {
            assert.equal(cookPermissions.includes(permission), false, `cook unexpectedly has ${permission}`);
          }
          summary.push("permissions: dispatcher/manager/cook ok");

          let workspace = await getWorkspace();
          assert.equal(workspace.response.headers.get("cache-control"), "no-store", "dispatcher workspace must be no-store");
          let orderingStatus = await getOrderingStatus();
          assert.equal(orderingStatus.response.headers.get("cache-control"), "no-store", "ordering status must be no-store");
          summary.push(`initial shift state: ${workspace.body?.data?.shift?.state}`);

          if (workspace.body?.data?.shift?.state === "PREVIOUS_SHIFT_OPEN") {
            const activeOrdersCount = workspace.body.data.shift.activeOrdersCount;
            if (activeOrdersCount > 0) {
              throw new Error(`previous shift has ${activeOrdersCount} active orders; close or finish non-smoke staging orders manually`);
            }
            if (workspace.body.data.shift.canClose) {
              await request(`/api/v1/dispatcher-shifts/${workspace.body.data.shift.id}/close`, {
                method: "POST",
                headers: authHeaders,
                body: JSON.stringify({ closedByName: "Staging Smoke" }),
              });
              workspace = await getWorkspace();
              summary.push("previous shift closed");
            } else {
              throw new Error("previous shift is open but cannot be closed by smoke; inspect staging shift state manually");
            }
          }

          if (workspace.body?.data?.shift?.state === "NOT_OPEN") {
            if (workspace.body.data.shift.canOpen) {
              await request("/api/v1/dispatcher-shifts/open", {
                method: "POST",
                headers: authHeaders,
                body: JSON.stringify({ responsibleName: "Staging Smoke" }),
              });
              workspace = await getWorkspace();
              summary.push("shift opened by smoke");
            } else {
              assert.equal(orderingStatus.body?.data?.acceptingOrders, false, "ordering must be closed before open threshold");
              const closedOrder = await requestAllowFailure("/api/v1/public/orders", {
                method: "POST",
                headers: { cookie: createPublicClientCookie("79009999202") },
                body: JSON.stringify({
                  deliveryAddress: "г. Smoke, ул. Test, д. 1",
                  recipientPhone: "+79009999202",
                  paymentMethod: "cash",
                  customerComment: smokeMarker,
                  items: [{
                    catalogItemId: data.catalogItemId,
                    catalogItemVariantId: data.catalogItemVariantId,
                    quantity: 1,
                    choices: [],
                  }],
                }),
              });
              assert.equal(closedOrder.response.status, 409, "public order must be rejected when shift cannot open yet");
              assert.equal(errorCode(closedOrder), "ORDERING_CLOSED", "closed-hours public order must return ORDERING_CLOSED");
              summary.push("closed-hours branch ok");
              console.log("STAGING_SMOKE_OK closed-hours shift gate");
              await pool.end();
              process.exit(0);
            }
          }

          if (workspace.body?.data?.shift?.state === "CLOSED") {
            assert.equal(orderingStatus.body?.data?.acceptingOrders, false, "ordering must be closed after today's shift is closed");
            const rejectedOrder = await requestAllowFailure("/api/v1/public/orders", {
              method: "POST",
              headers: { cookie: createPublicClientCookie("79009999202") },
              body: JSON.stringify({
                deliveryAddress: "г. Smoke, ул. Test, д. 1",
                recipientPhone: "+79009999202",
                paymentMethod: "cash",
                customerComment: smokeMarker,
                items: [{
                  catalogItemId: data.catalogItemId,
                  catalogItemVariantId: data.catalogItemVariantId,
                  quantity: 1,
                  choices: [],
                }],
              }),
            });
            assert.equal(rejectedOrder.response.status, 409, "public order must be rejected after today's shift is closed");
            assert.equal(errorCode(rejectedOrder), "ORDERING_CLOSED", "post-close public order must return ORDERING_CLOSED");
            const history = await request("/api/v1/dispatcher-shifts", { headers: authHeaders });
            assert.equal(history.response.headers.get("cache-control"), "no-store", "shift history must be no-store");
            summary.push("closed-day branch ok");
            console.log(`STAGING_SMOKE_OK closed-day shift gate :: ${summary.join(" | ")}`);
            await pool.end();
            process.exit(0);
          }

          assert.equal(workspace.body?.data?.shift?.state, "OPEN", "shift must be open for full smoke");
          orderingStatus = await getOrderingStatus();
          assert.equal(orderingStatus.body?.data?.acceptingOrders, true, "public ordering status must accept orders while shift is open");

          const beforeNewCount = workspace.body.data.counts.new;
          const publicOrder = await createPublicSmokeOrder();
          const publicOrderId = publicOrder.body?.data?.id;
          assert.ok(publicOrderId, "public smoke order was not created");
          assert.ok(publicOrder.body?.data?.shiftId, "public smoke order must include shiftId");
          assert.equal(publicOrder.body?.data?.status, "NEW", "public smoke order must start as NEW");
          assert.equal(publicOrder.body?.data?.source, "SITE", "public smoke order source must be SITE");

          workspace = await getWorkspace();
          assert.ok(hasOrder(workspace.body?.data?.orderGroups?.new, publicOrderId), "public smoke order is missing from dispatcher new group");
          assert.ok(workspace.body.data.counts.new >= beforeNewCount + 1, "new count did not increase");

          const kitchenBefore = await request("/api/v1/orders/kitchen", { headers: authHeaders });
          assert.equal(hasOrder(kitchenBefore.body?.data, publicOrderId), false, "NEW order must not be visible in kitchen");

          await setOrderStatus(publicOrderId, "SENT_TO_KITCHEN");
          workspace = await getWorkspace();
          assert.equal(hasOrder(workspace.body?.data?.orderGroups?.new, publicOrderId), false, "order must leave new group after dispatch");
          assert.ok(hasOrder(workspace.body?.data?.orderGroups?.inProgress, publicOrderId), "order must enter dispatcher in-progress group");
          const kitchenAfter = await request("/api/v1/orders/kitchen", { headers: authHeaders });
          assert.ok(hasOrder(kitchenAfter.body?.data, publicOrderId), "SENT_TO_KITCHEN order must be visible in kitchen");

          await setOrderStatus(publicOrderId, "READY");
          await setOrderStatus(publicOrderId, "PACKED");
          await setOrderStatus(publicOrderId, "DELIVERED_PAID");

          workspace = await getWorkspace();
          assert.ok(hasOrder(workspace.body?.data?.orderGroups?.completed, publicOrderId), "completed smoke order must be in completed group");
          assert.ok(workspace.body.data.shift.checksCount >= 1, "checks count must update after completion");
          assert.ok(workspace.body.data.shift.revenueCents > 0, "revenue must update after completion");

          const secondOrder = await createPublicSmokeOrder();
          const secondOrderId = secondOrder.body?.data?.id;
          assert.ok(secondOrderId, "second public smoke order was not created");
          const closeWithActive = await requestAllowFailure(`/api/v1/dispatcher-shifts/${workspace.body.data.shift.id}/close`, {
            method: "POST",
            headers: authHeaders,
            body: JSON.stringify({ closedByName: "Staging Smoke" }),
          });
          assert.equal(closeWithActive.response.status, 409, "close must fail with active smoke order");
          assert.equal(errorCode(closeWithActive), "SHIFT_HAS_ACTIVE_ORDERS", "active-order close must return SHIFT_HAS_ACTIVE_ORDERS");
          await setOrderStatus(secondOrderId, "SENT_TO_KITCHEN");
          await setOrderStatus(secondOrderId, "READY");
          await setOrderStatus(secondOrderId, "PACKED");
          await setOrderStatus(secondOrderId, "DELIVERED_PAID");

          workspace = await getWorkspace();
          const closeAttempt = await requestAllowFailure(`/api/v1/dispatcher-shifts/${workspace.body.data.shift.id}/close`, {
            method: "POST",
            headers: authHeaders,
            body: JSON.stringify({ closedByName: "Staging Smoke" }),
          });
          if (workspace.body.data.shift.canClose) {
            assert.equal(closeAttempt.response.status, 200, "close must succeed when close window is open and no active orders remain");
            const shiftDetail = await request(`/api/v1/dispatcher-shifts/${workspace.body.data.shift.id}`, { headers: authHeaders });
            assert.equal(shiftDetail.response.headers.get("cache-control"), "no-store", "shift detail must be no-store");
            assert.ok(shiftDetail.body?.data?.checksCount >= 2, "closed shift snapshots must keep checks");
            orderingStatus = await getOrderingStatus();
            assert.equal(orderingStatus.body?.data?.acceptingOrders, false, "ordering must close after shift close");
            const rejectedOrder = await requestAllowFailure("/api/v1/public/orders", {
              method: "POST",
              headers: { cookie: createPublicClientCookie("79009999202") },
              body: JSON.stringify({
                deliveryAddress: "г. Smoke, ул. Test, д. 1",
                recipientPhone: "+79009999202",
                paymentMethod: "cash",
                customerComment: smokeMarker,
                items: [{
                  catalogItemId: data.catalogItemId,
                  catalogItemVariantId: data.catalogItemVariantId,
                  quantity: 1,
                  choices: [],
                }],
              }),
            });
            assert.equal(rejectedOrder.response.status, 409, "public order must be rejected after shift close");
            assert.equal(errorCode(rejectedOrder), "ORDERING_CLOSED", "post-close public order must return ORDERING_CLOSED");
            const history = await request("/api/v1/dispatcher-shifts", { headers: authHeaders });
            assert.equal(history.response.headers.get("cache-control"), "no-store", "shift history must be no-store");
            assert.ok(Array.isArray(history.body?.data), "shift history must return an array");
            summary.push("full open-to-close branch ok");
          } else {
            assert.equal(closeAttempt.response.status, 409, "close before close threshold must be rejected");
            assert.equal(errorCode(closeAttempt), "SHIFT_CLOSE_TOO_EARLY", "early close must return SHIFT_CLOSE_TOO_EARLY");
            summary.push("pre-21:00 completion branch ok");
          }

          const inventoryWorkspace = await request("/api/v1/inventory/workspace", { headers: authHeaders });
          assert.ok(Array.isArray(inventoryWorkspace.body?.data?.products), "inventory workspace has no products array");
          const incoming = await request("/api/v1/inventory/incoming-acts", {
            method: "POST",
            headers: authHeaders,
            body: JSON.stringify({
              responsibleEmployeeId: data.employeeId,
              supplierName: "SMOKE Supplier",
              notes: "staging smoke",
              items: [{ productId: data.productId, quantity: 1, price: 10 }],
            }),
          });
          assert.ok(incoming.body?.data?.id, "incoming act was not created");
          await request(`/api/v1/inventory/incoming-acts/${incoming.body.data.id}/complete`, {
            method: "POST",
            headers: authHeaders,
            body: "{}",
          });
          const duplicateComplete = await requestAllowFailure(`/api/v1/inventory/incoming-acts/${incoming.body.data.id}/complete`, {
            method: "POST",
            headers: authHeaders,
            body: "{}",
          });
          assert.equal(duplicateComplete.response.status, 400, "duplicate incoming completion must be rejected");

          const publicCatalog = await request("/api/v1/public/catalog");
          assert.ok(
            publicCatalog.body?.data?.some((item) => item.id === data.catalogItemId),
            "public catalog does not expose smoke item",
          );

          const smsProbe = await requestAllowFailure("/api/v1/public-auth/register/request-code", {
            method: "POST",
            body: JSON.stringify({
              firstName: "Smoke",
              lastName: "Sms",
              birthDate: "1990-01-01",
              phone: "+79009999303",
            }),
          });
          assert.ok(
            smsProbe.response.ok || smsProbe.body?.error || smsProbe.body?.message,
            "public SMS request returned an unreadable response",
          );

          await request(`/api/v1/public/orders/${publicOrderId}`, {
            headers: { cookie: createPublicClientCookie("79009999202") },
          });

          await pool.end();
          console.log(`STAGING_SMOKE_OK auth shift inventory public-flow :: ${summary.join(" | ")}`);
          NODE
          REMOTE

      - name: Write sanitized smoke summary
        if: success()
        run: |
          {
            echo "## Staging smoke"
            echo ""
            echo "- Backend health checked"
            echo "- Role permission contract checked"
            echo "- Shift-aware public order flow checked"
            echo "- Dispatcher workspace/kitchen/completion flow checked"
            echo "- Cache headers checked for shift endpoints"
          } >> "$GITHUB_STEP_SUMMARY"
