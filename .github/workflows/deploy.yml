name: Deploy backend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: backend-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      APP_DIR: /home/deploy/apps/food-crm-backend
      DEPLOY_HOST: 163.5.29.68
      DEPLOY_USER: deploy
      DEPLOY_PORT: 22
      DATABASE_URL: postgresql://food_crm_user:change-me@localhost:5432/food_crm
      SESSION_SECRET: build-time-placeholder-session-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s' "${{ secrets.DEPLOY_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          set -euo pipefail
          RELEASE_DIR="$APP_DIR/releases/$GITHUB_SHA"
          SSH=(ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST")
          "${SSH[@]}" "mkdir -p '$RELEASE_DIR'"
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.env.*' \
            -czf - . | "${SSH[@]}" "tar -xzf - -C '$RELEASE_DIR'"

      - name: Migrate and activate release
        run: |
          set -euo pipefail
          SSH=(ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST")
          "${SSH[@]}" "APP_DIR='$APP_DIR' RELEASE_DIR='$APP_DIR/releases/$GITHUB_SHA' bash -s" <<'REMOTE'
          set -euo pipefail
          test -f "$APP_DIR/shared/.env"
          grep -q '^PUBLIC_AUTH_TEST_PHONE=' "$APP_DIR/shared/.env" || echo 'PUBLIC_AUTH_TEST_PHONE=79002000001' >> "$APP_DIR/shared/.env"
          grep -q '^PUBLIC_AUTH_TEST_CODE=' "$APP_DIR/shared/.env" || echo 'PUBLIC_AUTH_TEST_CODE=111111' >> "$APP_DIR/shared/.env"
          ln -sfn "$APP_DIR/shared/.env" "$RELEASE_DIR/.env"
          cd "$RELEASE_DIR"
          npm ci
          npm run db:deploy
          npm run public:test-client
          ln -sfn "$RELEASE_DIR" "$APP_DIR/current"
          cd "$APP_DIR/current"
          pm2 delete food-crm-backend || true
          pm2 start ecosystem.config.cjs --only food-crm-backend --update-env
          sleep 5
          curl -fsS http://127.0.0.1:4000/api/v1/health >/dev/null
          UPLOAD_STATUS="$(curl -sS -o /tmp/food-crm-upload-route-check.txt -w '%{http_code}' -X POST http://127.0.0.1:4000/api/v1/catalog/uploads)"
          test "$UPLOAD_STATUS" != "404"
          pm2 save
          find "$APP_DIR/releases" -mindepth 1 -maxdepth 1 -type d ! -samefile "$RELEASE_DIR" -printf '%T@ %p\n' | sort -nr | tail -n +6 | cut -d' ' -f2- | xargs -r rm -rf
          REMOTE
