name: Deploy backend staging

on:
  push:
    branches: ["dev"]
  workflow_dispatch:

concurrency:
  group: backend-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      APP_DIR: /home/deploy/apps/food-crm-backend-staging
      PROD_APP_DIR: /home/deploy/apps/food-crm-backend
      DEPLOY_HOST: 163.5.29.68
      DEPLOY_USER: deploy
      DEPLOY_PORT: 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s' "${{ secrets.DEPLOY_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          set -euo pipefail
          RELEASE_DIR="$APP_DIR/releases/$GITHUB_SHA"
          SSH=(ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST")
          "${SSH[@]}" "mkdir -p '$RELEASE_DIR'"
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.env.*' \
            -czf - . | "${SSH[@]}" "tar -xzf - -C '$RELEASE_DIR'"

      - name: Prepare staging environment
        run: |
          set -euo pipefail
          SSH=(ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST")
          "${SSH[@]}" "APP_DIR='$APP_DIR' PROD_APP_DIR='$PROD_APP_DIR' RELEASE_DIR='$APP_DIR/releases/$GITHUB_SHA' bash -s" <<'REMOTE'
          set -euo pipefail
          mkdir -p "$APP_DIR/shared"
          if [ ! -f "$APP_DIR/shared/.env" ]; then
            if [ -f "$PROD_APP_DIR/shared/.env" ]; then
              cp "$PROD_APP_DIR/shared/.env" "$APP_DIR/shared/.env"
            else
              touch "$APP_DIR/shared/.env"
            fi
          fi
          test -f "$APP_DIR/shared/.env"

          PROD_DATABASE_URL="$(grep -E '^DATABASE_URL=' "$PROD_APP_DIR/shared/.env" | cut -d '=' -f2-)"
          if [ -z "$PROD_DATABASE_URL" ]; then
            echo "ERROR: ąĮąĄčé DATABASE_URL ą▓ $PROD_APP_DIR/shared/.env"
            exit 1
          fi
          STAGING_DATABASE_URL="$(printf '%s' "$PROD_DATABASE_URL" | sed -E 's#(^.*)/([^/?]+)(\?.*)?$#\1/food_crm_staging\3#')"
          if [ "$STAGING_DATABASE_URL" = "$PROD_DATABASE_URL" ]; then
            echo "ERROR: ąĮąĄ čāą┤ą░ą╗ąŠčüčī ą┐ąŠą╗čāčćąĖčéčī URL ą┤ą╗čÅ food_crm_staging ąĖąĘ prod DATABASE_URL."
            exit 1
          fi

          grep -v -E '^(DATABASE_URL|PORT|BACKEND_CORS_ORIGIN|BACKEND_SESSION_COOKIE_DOMAIN|BACKEND_SESSION_COOKIE_NAME)=' "$APP_DIR/shared/.env" > "$APP_DIR/shared/.env.tmp" || true
          mv "$APP_DIR/shared/.env.tmp" "$APP_DIR/shared/.env"
          {
            echo "DATABASE_URL=$STAGING_DATABASE_URL"
            echo "PORT=4100"
            echo "BACKEND_CORS_ORIGIN=https://dev.crm.crmandromeda.ru,http://localhost:3000,http://127.0.0.1:3000"
            echo "BACKEND_SESSION_COOKIE_DOMAIN=.crmandromeda.ru"
            echo "BACKEND_SESSION_COOKIE_NAME=food_crm_staging_api_session"
          } >> "$APP_DIR/shared/.env"
          ln -sfn "$APP_DIR/shared/.env" "$RELEASE_DIR/.env"
          sudo -n -u postgres psql -v ON_ERROR_STOP=1 -d postgres <<'SQL'
          SELECT 'CREATE DATABASE food_crm_staging OWNER food_crm_user'
          WHERE NOT EXISTS (
            SELECT FROM pg_database WHERE datname = 'food_crm_staging'
          )\gexec
          ALTER DATABASE food_crm_staging OWNER TO food_crm_user;
          SQL
          sudo -n -u postgres psql -v ON_ERROR_STOP=1 -d food_crm_staging <<'SQL'
          ALTER SCHEMA public OWNER TO food_crm_user;
          GRANT ALL ON SCHEMA public TO food_crm_user;
          SQL
          REMOTE

      - name: Install release dependencies
        run: |
          set -euo pipefail
          SSH=(ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST")
          "${SSH[@]}" "RELEASE_DIR='$APP_DIR/releases/$GITHUB_SHA' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$RELEASE_DIR"
          npm ci
          REMOTE

      - name: Deploy database migrations
        run: |
          set -euo pipefail
          SSH=(ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST")
          "${SSH[@]}" "RELEASE_DIR='$APP_DIR/releases/$GITHUB_SHA' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$RELEASE_DIR"
          LOG_FILE=/tmp/food-crm-staging-db-deploy.log
          if ! npm run db:deploy 2>&1 | tee "$LOG_FILE"; then
            SUMMARY="$(tail -n 30 "$LOG_FILE" | sed -E 's#(postgres(ql)?://)[^[:space:]]+#\1***#g' | tr '\n' ' ' | cut -c1-900)"
            echo "::error title=Prisma migrate deploy failed::$SUMMARY"
            exit 1
          fi
          REMOTE

      - name: Activate backend process
        run: |
          set -euo pipefail
          SSH=(ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST")
          "${SSH[@]}" "APP_DIR='$APP_DIR' RELEASE_DIR='$APP_DIR/releases/$GITHUB_SHA' bash -s" <<'REMOTE'
          set -euo pipefail
          ln -sfn "$RELEASE_DIR" "$APP_DIR/current"
          cd "$APP_DIR/current"
          pm2 delete food-crm-backend-staging || true
          pm2 start ecosystem.staging.config.cjs --only food-crm-backend-staging --update-env
          pm2 save
          REMOTE

      - name: Verify backend health
        run: |
          set -euo pipefail
          SSH=(ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST")
          "${SSH[@]}" "APP_DIR='$APP_DIR' RELEASE_DIR='$APP_DIR/releases/$GITHUB_SHA' bash -s" <<'REMOTE'
          set -euo pipefail
          sleep 5
          curl -fsS http://127.0.0.1:4100/api/v1/health >/dev/null
          UPLOAD_STATUS="$(curl -sS -o /tmp/food-crm-staging-upload-route-check.txt -w '%{http_code}' -X POST http://127.0.0.1:4100/api/v1/catalog/uploads)"
          test "$UPLOAD_STATUS" != "404"
          find "$APP_DIR/releases" -mindepth 1 -maxdepth 1 -type d ! -samefile "$RELEASE_DIR" -printf '%T@ %p\n' | sort -nr | tail -n +6 | cut -d' ' -f2- | xargs -r rm -rf
          REMOTE
